# Stable GLX preset (no opacity rules)
backend = "xrender";
vsync = false;
no-frame-pacing = true;
legacy-backends = true;

# GLX compatibility options
use-damage = false;
glx-no-stencil = true;
glx-no-rebind-pixmap = false;
xrender-sync-fence = true;

fading = true;
fade-in-step = 0.045;
fade-out-step = 0.045;
fade-delta = 5;
